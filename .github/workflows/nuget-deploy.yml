name: NuGet Deploy Validation

on:
  pull_request:
    types:
      - closed

jobs:
  validate-merged-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Ensure Directory.Build.props changed
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const hasDirectoryBuildPropsChange = files.some(file => file.filename === "Directory.Build.props");

            if (!hasDirectoryBuildPropsChange) {
              core.setFailed("Directory.Build.props must be changed in the merged PR.");
            }

      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build solution
        run: dotnet build ./src/src.sln -c Release

      - name: Run unit tests
        run: dotnet test ./src/src.sln -c Release --no-build

      - name: Pack NuGet packages
        run: dotnet pack ./src/src.sln -c Release --no-build -o ./artifacts/nupkgs

      - name: Push NuGet packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SOURCE_URL: ${{ secrets.NUGET_SOURCE_URL }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is required for package publishing."
            exit 1
          fi

          SOURCE_URL="${NUGET_SOURCE_URL:-https://api.nuget.org/v3/index.json}"

          mapfile -t packages < <(find ./artifacts/nupkgs -maxdepth 1 -type f -name '*.nupkg' ! -name '*.symbols.nupkg')

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No NuGet packages were produced to publish."
            exit 1
          fi

          dotnet nuget push "./artifacts/nupkgs/*.nupkg" \
            --source "$SOURCE_URL" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate \
            --no-symbols
