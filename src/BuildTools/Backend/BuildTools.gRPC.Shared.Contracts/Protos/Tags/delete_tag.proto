syntax = "proto3";

package buildtools.shared.contracts.grpc.feature.tags;

option csharp_namespace = "BuildTools.Shared.Contracts.GRPC.Feature.Tags";

import "Common/unit_result.proto";

message DeleteTagCommand {
  string name = 1;
  bool commit_changes = 2;
}

service DeleteTagCommandService {
  rpc DeleteTag(DeleteTagCommand) returns (idfc.abstractions.grpc.contracts.common.UnitResult);
}