syntax = "proto3";

package buildtools.shared.contracts.grpc.feature.tags;

option csharp_namespace = "BuildTools.Shared.Contracts.GRPC.Features.Tags";

import "Shared/idfcr-shared/v1/unit_result.proto";
import "Shared/idfcr-shared/v1/ordered_request.proto";
import "Features/Tags/upsert_tag.proto"; // reuses TagDto

message GetPagedTagsQuery {
  repeated idfcr.abstractions.grpc.contracts.common.SortOrder ordered_fields = 1;
  int32 page_size = 2;
  int32 page_index = 3;
  string name = 4;
  string name_contains = 5;
}

message GetPagedTagsQueryResult {
  idfcr.abstractions.grpc.contracts.common.UnitResult result = 1;
  repeated TagDto tags = 2;
  int32 total_rows = 3;
  int32 total_pages = 4;
  int32 page_size = 5;
  int32 page_index = 6;
}

service GetPagedTagsQueryService {
  rpc GetPagedTags(GetPagedTagsQuery) returns (GetPagedTagsQueryResult);
}